spring:
  application:
    name: collabcode-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/collabcode}
    username: ${DATABASE_USERNAME:collabcode}
    password: ${DATABASE_PASSWORD:collabcode}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,profile,email
            redirect-uri: "${BACKEND_BASE_URL:http://localhost:8080}/api/v1/auth/google/callback"
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: read:user,user:email
            redirect-uri: "${BACKEND_BASE_URL:http://localhost:8080}/api/v1/auth/github/callback"
        provider:
          github:
            user-info-uri: https://api.github.com/user

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true

collabcode:
  security:
    jwt-secret: ${JWT_SECRET:replace-with-a-32-char-minimum-secret}
    jwt-expiration-seconds: ${JWT_EXPIRATION:900}
    refresh-token-expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:30}
    service-jwt-secret: ${SERVICE_JWT_SECRET:replace-with-a-strong-service-secret}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
