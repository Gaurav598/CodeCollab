spring:
  application:
    name: collabcode-backend

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/collabcode}
      auto-index-creation: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,profile,email
            redirect-uri: "${BACKEND_BASE_URL:http://localhost:8080}/api/v1/auth/google/callback"
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: read:user,user:email
            redirect-uri: "${BACKEND_BASE_URL:http://localhost:8080}/api/v1/auth/github/callback"
        provider:
          github:
            user-info-uri: https://api.github.com/user

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true

collabcode:
  security:
    jwt-secret: ${JWT_SECRET:replace-with-a-32-char-minimum-secret}
    jwt-expiration-seconds: ${JWT_EXPIRATION:900}
    refresh-token-expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:30}
    service-jwt-secret: ${SERVICE_JWT_SECRET:replace-with-a-strong-service-secret}
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:false}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  sandbox:
    service-url: ${SANDBOX_SERVICE_URL:http://localhost:3001}
    default-timeout-ms: ${SANDBOX_DEFAULT_TIMEOUT_MS:5000}
    max-timeout-ms: ${SANDBOX_MAX_TIMEOUT_MS:10000}
    rate-limit-per-minute: ${SANDBOX_RATE_LIMIT_PER_MINUTE:30}
  ai:
    default-provider: ${AI_DEFAULT_PROVIDER:local}
    fallback-order: ${AI_FALLBACK_ORDER:gemini,openai,claude,deepseek,local}
    timeout-ms: ${AI_TIMEOUT_MS:12000}
    rate-limit-per-minute: ${AI_RATE_LIMIT_PER_MINUTE:24}
    autocomplete-rate-limit-per-minute: ${AI_AUTOCOMPLETE_RATE_LIMIT_PER_MINUTE:90}
    max-prompt-chars: ${AI_MAX_PROMPT_CHARS:24000}
    max-context-files: ${AI_MAX_CONTEXT_FILES:8}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-1.5-pro}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/chat/completions}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}
    claude:
      api-key: ${CLAUDE_API_KEY:}
      model: ${CLAUDE_MODEL:claude-3-5-sonnet-latest}
      base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com/v1/messages}
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      model: ${DEEPSEEK_MODEL:deepseek-coder}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/chat/completions}
