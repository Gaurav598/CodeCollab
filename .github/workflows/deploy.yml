name: CodeCollab CI Verification

on:
  push:
    branches: [ "main" ]

jobs:
  verify-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Verify Backend Compilation
        run: |
          cd backend
          chmod +x gradlew
          ./gradlew build -x test

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Verify Sync Service Compilation
        run: |
          cd sync-service
          npm install
          npm run build