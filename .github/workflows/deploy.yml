name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Google Cloud ke sath Auth
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 2. Google Cloud SDK setup
      - uses: google-github-actions/setup-gcloud@v2

      # 3. Enable Required APIs
      - name: Enable GCP APIs
        run: |
          gcloud services enable run.googleapis.com
          gcloud services enable cloudbuild.googleapis.com
          gcloud services enable artifactregistry.googleapis.com

      # 4. Backend deploy
      - name: Deploy Backend
        run: |
          gcloud run deploy codecollab-backend \
          --source ./backend \
          --region asia-south1 \
          --allow-unauthenticated \
          --set-env-vars SPRING_DATA_MONGODB_URI=${{ secrets.MONGO_URI }},SPRING_DATA_REDIS_URL=${{ secrets.REDIS_URL }},EXECUTION_ENGINE_URL=${{ secrets.EXECUTION_ENGINE_URL }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      # 5. Sync Service deploy
      - name: Deploy Sync Service
        run: |
          gcloud run deploy codecollab-sync \
          --source ./sync-service \
          --region asia-south1 \
          --allow-unauthenticated \
          --set-env-vars REDIS_URL=${{ secrets.REDIS_URL }}

      # 6. Dynamic URL Fetch & Frontend Deploy
      - name: Deploy Frontend
        run: |
          # Pehle backend aur sync service ke live Cloud Run URLs fetch karo
          BACKEND_LIVE_URL=$(gcloud run services describe codecollab-backend --region asia-south1 --format 'value(status.url)')
          SYNC_LIVE_URL=$(gcloud run services describe codecollab-sync --region asia-south1 --format 'value(status.url)')
          
          # HTTP ko WSS (WebSocket Secure) me convert karo
          WS_LIVE_URL="${BACKEND_LIVE_URL/https/wss}/ws"
          WSS_SYNC_LIVE_URL="${SYNC_LIVE_URL/https/wss}"

          echo "Backend URL: $BACKEND_LIVE_URL"
          echo "Websocket URL: $WS_LIVE_URL"
          
          # Frontend deploy karo aur build time par URLs pass karo
          gcloud run deploy codecollab-frontend \
          --source ./frontend \
          --region asia-south1 \
          --allow-unauthenticated \
          --set-build-env-vars NEXT_PUBLIC_API_BASE_URL=$BACKEND_LIVE_URL,NEXT_PUBLIC_STOMP_WS_URL=$WS_LIVE_URL,NEXT_PUBLIC_SYNC_WS_URL=$WSS_SYNC_LIVE_URL