services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-collabcode}
      POSTGRES_USER: ${POSTGRES_USER:-collabcode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-collabcode}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-collabcode} -d ${POSTGRES_DB:-collabcode}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/collabcode}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-collabcode}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-collabcode}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-strong-secret}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-900}
      SERVICE_JWT_SECRET: ${SERVICE_JWT_SECRET:-replace-with-a-strong-service-secret}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  sync-service:
    build:
      context: ./sync-service
    environment:
      PORT: 1234
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BACKEND_INTERNAL_URL: http://backend:8080/api/v1/internal
      SERVICE_JWT_SECRET: ${SERVICE_JWT_SECRET:-replace-with-a-strong-service-secret}
    ports:
      - "1234:1234"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api/v1}
      NEXT_PUBLIC_SYNC_WS_URL: ${NEXT_PUBLIC_SYNC_WS_URL:-ws://localhost:1234}
      NEXT_PUBLIC_STOMP_WS_URL: ${NEXT_PUBLIC_STOMP_WS_URL:-ws://localhost:8080/ws}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
      sync-service:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
