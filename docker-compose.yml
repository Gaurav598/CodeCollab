services:
  redis:
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      MONGODB_URI: ${MONGODB_URI}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-strong-secret}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-900}
      SERVICE_JWT_SECRET: ${SERVICE_JWT_SECRET:-replace-with-a-strong-service-secret}
      EXECUTION_ENGINE_URL: ${EXECUTION_ENGINE_URL}
      EXECUTION_ENGINE_API_KEY: ${EXECUTION_ENGINE_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dummy}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dummy}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-dummy}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-dummy}
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy

  sync-service:
    build:
      context: ./sync-service
    environment:
      PORT: 1234
      REDIS_URL: redis://redis:6379
      BACKEND_INTERNAL_URL: http://backend:8080/api/v1/internal
      SERVICE_JWT_SECRET: ${SERVICE_JWT_SECRET:-replace-with-a-strong-service-secret}
    ports:
      - "1234:1234"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api/v1}
      NEXT_PUBLIC_SYNC_WS_URL: ${NEXT_PUBLIC_SYNC_WS_URL:-ws://localhost:1234}
      NEXT_PUBLIC_STOMP_WS_URL: ${NEXT_PUBLIC_STOMP_WS_URL:-ws://localhost:8080/ws}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
      sync-service:
        condition: service_started

volumes:
  redis-data:
